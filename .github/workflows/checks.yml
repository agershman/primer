name: Checks

# Run on every PR + manual trigger. This is the gate the deploy workflow
# also runs as its first job, so PRs that pass this check are guaranteed to
# pass the deploy gate after merge.

on:
  pull_request:
  # Also run on direct pushes to main so that amended-root commits or
  # any push that bypassed PR review still gets validated. Without
  # this, formatter / type / test drift can land on main unnoticed.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Skip duplicate runs when a PR is force-pushed.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun x vitest run

      - name: Build
        run: bun x vite build
