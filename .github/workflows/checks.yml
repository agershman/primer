name: Checks

# Run on every PR + manual trigger. This is the gate the deploy workflow
# also runs as its first job, so PRs that pass this check are guaranteed to
# pass the deploy gate after merge.

on:
  pull_request:
  # Also run on direct pushes to main so that amended-root commits or
  # any push that bypassed PR review still gets validated. Without
  # this, formatter / type / test drift can land on main unnoticed.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Skip duplicate runs when a PR is force-pushed.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, unit + integration test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `wrangler.api.toml` is gitignored (operators copy from the
      # example and edit per deployment), but a few tests
      # (`tests/unit/wrangler-config.test.ts`) read it directly to
      # pin operational + auth-posture invariants. Copy the example
      # into place so those tests have a file to read against —
      # the example carries the same production posture the tests
      # assert (cpu_ms = 300000, cloudflare-access mode, allowlist).
      - name: Bootstrap wrangler.api.toml from example (for tests)
        run: cp wrangler.api.example.toml wrangler.api.toml

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      # Vitest covers the unit tier (source-text contracts) plus the
      # integration tier added alongside this: in-memory D1 route
      # tests via better-sqlite3 + Hono test-app, and React Testing
      # Library component tests for the Settings panels and the
      # onboarding wizard. All pure node — no Cloudflare account.
      - name: Test
        run: bun x vitest run

      - name: Build
        run: bun x vite build

  e2e:
    name: E2E (Playwright, mocked API)
    runs-on: ubuntu-latest
    # Independent job so a Playwright browser install or flake
    # doesn't block the lint/typecheck/build signal.
    #
    # `continue-on-error: true` is intentional FOR NOW: this is the
    # initial PR introducing E2E and we don't yet have access to CI
    # logs to debug install / launch issues. Once a green run
    # confirms the harness is sound, drop continue-on-error so
    # the job actually gates merges.
    continue-on-error: true
    #
    # Browser binaries are not cached across runs yet — repo policy
    # is to pin every external action to a 40-char SHA, and I don't
    # have resolved SHAs for actions/cache. Follow-up: pin + add
    # caching + report-upload-on-failure.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `playwright install --with-deps` requires sudo access to
      # apt-get; the way bun proxies the playwright binary appears
      # not to forward sudo cleanly. ubuntu-latest already ships
      # most of chromium's system libs, so install the browser
      # binary alone and rely on the runner's pre-installed deps.
      # If a missing-lib error surfaces we'll add a targeted
      # `apt-get install` step rather than re-introducing
      # `--with-deps`.
      - name: Install Playwright chromium
        run: bun run test:e2e:install

      # E2E specs intercept every /api/* call in the page (see
      # tests/e2e/api-mocks.ts), so this job needs no Cloudflare
      # account, no wrangler, no external creds. The Vite preview
      # server only serves static assets.
      - name: E2E
        run: bun run test:e2e
